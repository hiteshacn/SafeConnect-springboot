name: SafeConnect API — Build, Package & Deploy

# ─────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────
# Environment Variables
# ─────────────────────────────────────────────────────────────
env:
  PROJECT_ID:          safeconnect-492714
  REGION:              asia-south1
  SERVICE_NAME:        safeconnect-api
  IMAGE_PATH:          asia-south1-docker.pkg.dev/safeconnect-492714/safeconnect-repo/safeconnect-api
  WIF_PROVIDER:        projects/283056076575/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-deployer@safeconnect-492714.iam.gserviceaccount.com

# ─────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────
  # JOB 1: Build & Test
  # ───────────────────────────────────────────────────────────
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR & run tests
        run: ./mvnw clean verify

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ───────────────────────────────────────────────────────────
  # JOB 2: Docker Build & Push
  # ───────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Required for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR from build job
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      # Keyless auth — no GCP_SA_KEY needed
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_PATH }}:${{ steps.meta.outputs.tag }} \
            --tag ${{ env.IMAGE_PATH }}:latest \
            --label "git-commit=${{ github.sha }}" \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_PATH }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.IMAGE_PATH }}:latest

  # ───────────────────────────────────────────────────────────
  # JOB 3: Deploy to Cloud Run
  # ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker

    # Required for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    steps:
      # Keyless auth — no GCP_SA_KEY needed
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_PATH }}:${{ needs.docker.outputs.image_tag }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=100 \
            --concurrency=200 \
            --timeout=60s \
            --set-env-vars="SPRING_PROFILES_ACTIVE=prod,GCP_PROJECT_ID=safeconnect-492714,DB_URL=jdbc:postgresql://localhost/safeconnect,DB_USERNAME=safeconnect_user,DB_PASSWORD=changeme,MSG91_AUTH_KEY=your_msg91_key_here,REDIS_HOST=localhost"

      # TODO: Replace plain env vars above with Secret Manager:
      # --set-secrets="DB_PASSWORD=safeconnect-db-password:latest,MSG91_AUTH_KEY=safeconnect-msg91-key:latest"

      - name: Get deployed service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "🚀 SafeConnect API live at: ${URL}"
          echo "### 🚀 Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${URL}" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/actuator/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed — HTTP ${STATUS}"
            exit 1
          fi
          echo "✅ Health check passed — HTTP ${STATUS}"
