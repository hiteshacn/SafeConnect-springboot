name: SafeConnect API — Build, Package & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID:          safeconnect-492714
  REGION:              asia-south1
  SERVICE_NAME:        safeconnect-api
  IMAGE_PATH:          asia-south1-docker.pkg.dev/safeconnect-492714/safeconnect-repo/safeconnect-api
  WIF_PROVIDER:        projects/283056076575/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-deployer@safeconnect-492714.iam.gserviceaccount.com

jobs:

  # ───────────────────────────────────────────────────────────
  # JOB 1: Build & Test
  # ───────────────────────────────────────────────────────────
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Using mvn directly — no mvnw needed
      - name: Build JAR & run tests
        run: mvn clean verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ───────────────────────────────────────────────────────────
  # JOB 2: Docker Build & Push
  # ───────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_PATH }}:${{ steps.meta.outputs.tag }} \
            --tag ${{ env.IMAGE_PATH }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_PATH }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.IMAGE_PATH }}:latest

  # ───────────────────────────────────────────────────────────
  # JOB 3: Deploy to Cloud Run
  # ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_PATH }}:${{ needs.docker.outputs.image_tag }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --concurrency=200 \
            --timeout=60s \
            --set-env-vars="SPRING_PROFILES_ACTIVE=default,GCP_PROJECT_ID=safeconnect-492714"

      # TODO: replace --set-env-vars with --set-secrets when Secret Manager is ready

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "🚀 Live at: ${URL}"
          echo "### 🚀 Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${URL}" >> $GITHUB_STEP_SUMMARY

      - name: Health check
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/actuator/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed — HTTP ${STATUS}"
            exit 1
          fi
          echo "✅ Health check passed — HTTP ${STATUS}"
