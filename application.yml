spring:
  application:
    name: safeconnect-v1

  # H2 in-memory — no install needed, resets on restart
  datasource:
    url: jdbc:h2:mem:safeconnectdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop   # auto-creates tables on start, drops on stop
    show-sql: true

  # H2 browser console — useful for local debugging
  # Access at http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.safeconnect: DEBUG
